name: Deploy Recon

on:
  push:
    paths:
      - 'programs/**'
      - 'scripts/**'
      - 'config/**'
      - 'docs/**'
      - 'deploy.sh'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Resolve instance id
        id: resolve
        run: |
          instance_id=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=ars-ec2" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          if [[ -z "$instance_id" || "$instance_id" == "None" ]]; then
            echo "No running instance found" >&2
            exit 1
          fi
          echo "instance_id=$instance_id" >> "$GITHUB_OUTPUT"

      - name: Verify SSM is online
        run: |
          ping_status=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=${{ steps.resolve.outputs.instance_id }}" \
            --query 'InstanceInformationList[0].PingStatus' \
            --output text)
          if [[ "$ping_status" != "Online" ]]; then
            echo "Instance is not managed by SSM yet: $ping_status" >&2
            exit 1
          fi

      - name: Run deploy via SSM
        run: |
          set +e
          command_id=$(aws ssm send-command \
            --instance-ids "${{ steps.resolve.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy recon repo" \
            --parameters 'commands=["cd /recon-repo && git pull --ff-only"]' \
            --query 'Command.CommandId' \
            --output text)

          send_rc=$?
          if [[ $send_rc -ne 0 ]]; then
            echo "Failed to send SSM command" >&2
            exit $send_rc
          fi

          aws ssm wait command-executed \
            --command-id "$command_id" \
            --instance-id "${{ steps.resolve.outputs.instance_id }}"

          wait_rc=$?

          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "${{ steps.resolve.outputs.instance_id }}" \
            --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
            --output json

          invoke_rc=$?
          set -e

          if [[ $wait_rc -ne 0 || $invoke_rc -ne 0 ]]; then
            exit 1
          fi
